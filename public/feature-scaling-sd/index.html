<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Feature scaling — linear regression</title>
  <style>
    :root {
      --bg: #070a10;
      --panel: rgba(18, 24, 36, 0.92);
      --text: #e8eef7;
      --muted: #8b9cb8;
      --accent: #fbbf24;
      --accent2: #fb923c;
      --bar-bg: #1a2233;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, "Segoe UI", sans-serif;
      overflow: hidden;
    }
    .layout {
      display: flex;
      flex-direction: column;
      height: 100%;
      min-height: 100%;
    }
    .title-standalone {
      flex-shrink: 0;
      padding: 10px 14px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
      border-bottom: 1px solid #1e293b;
    }
    .embed .title-standalone { display: none; }
    #stage {
      flex: 1;
      min-height: 0;
      position: relative;
      background: radial-gradient(ellipse 80% 70% at 50% 15%, #2a1810 0%, #070a10 65%);
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #hud {
      flex-shrink: 0;
      position: relative;
      z-index: 20;
      padding: 8px 12px 10px;
      background: var(--panel);
      border-top: 1px solid rgba(251, 191, 36, 0.2);
      backdrop-filter: blur(10px);
    }
    .bar {
      height: 4px;
      background: var(--bar-bg);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .bar > i {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      border-radius: 2px;
    }
    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    button {
      background: #1e293b;
      color: var(--text);
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 7px 14px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
    }
    button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .time {
      font-variant-numeric: tabular-nums;
      color: var(--muted);
      font-size: 0.8rem;
      margin-left: auto;
    }
    #chapter {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--accent2);
      margin-bottom: 4px;
    }
    #cap {
      font-size: clamp(0.78rem, 1.6vw, 0.92rem);
      line-height: 1.5;
      color: #cbd5e1;
      max-height: clamp(3.2rem, 14vh, 5.5rem);
      overflow-y: auto;
    }
    .hint {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 6px;
    }
    .embed .hint { display: none; }
  </style>
</head>
<body>
  <div class="layout" id="layout">
    <div class="title-standalone">Feature scaling — walkthrough</div>
    <div id="stage"><canvas id="c" aria-label="Feature scaling animation"></canvas></div>
    <div id="hud">
      <div id="chapter"></div>
      <div class="bar"><i id="prog"></i></div>
      <div class="controls">
        <button type="button" id="play">Play</button>
        <button type="button" id="restart">Restart</button>
        <span class="time"><span id="cur">0:00</span> / <span id="tot">—</span></span>
      </div>
      <div id="cap"></div>
      <p class="hint">Tip: Space toggles play/pause.</p>
    </div>
  </div>

  <script>
(function () {
  const DURATION = 48;
  const BASE_W = 640;
  const BASE_H = 480;

  const params = new URLSearchParams(location.search);
  if (params.has("embed")) document.getElementById("layout").classList.add("embed");

  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d", { alpha: false });
  const stage = document.getElementById("stage");
  const capEl = document.getElementById("cap");
  const chapterEl = document.getElementById("chapter");
  const progEl = document.getElementById("prog");
  const curEl = document.getElementById("cur");
  const playBtn = document.getElementById("play");
  const restartBtn = document.getElementById("restart");
  const totEl = document.getElementById("tot");

  let viewW = 640;
  let viewH = 480;
  let dpr = 1;
  let t = 0;
  let playing = false;
  let lastTs = 0;

  function fmt(sec) {
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return m + ":" + String(s).padStart(2, "0");
  }
  totEl.textContent = fmt(DURATION);

  const cues = [
    { start: 0, end: 5, chapter: "The problem", text: "When inputs live on wildly different numeric ranges, optimization geometry gets skewed. Gradient descent still works — but it can crawl and zigzag. Scaling fixes the shape of the problem." },
    { start: 5, end: 11, chapter: "Raw features", text: "Example: house size in square feet (thousands) vs age in years (single digits). The numbers are both valid, but their magnitudes are not comparable. Distance-based models and gradient steps react to those raw sizes." },
    { start: 11, end: 19, chapter: "Elongated loss", text: "In weight space, MSE can form a long narrow valley: changing one weight moves loss fast; the other direction is flat. Steepest descent bounces across the valley — many small steps." },
    { start: 19, end: 26, chapter: "After scaling", text: "Standardize each feature: subtract mean, divide by standard deviation. Roughly zero mean and unit variance per column. The same model class, but contours look rounder — descent can aim straight at the basin." },
    { start: 26, end: 33, chapter: "Z-score", text: "z = (x − μ) / σ per feature (using training statistics). This is the most common default before linear models, k-NN, SVMs, and neural nets in many pipelines." },
    { start: 33, end: 38, chapter: "Gradients", text: "Unscaled inputs often make partial derivatives unequal in size — one weight dominates the update. Balanced features spread curvature more evenly across dimensions." },
    { start: 38, end: 44, chapter: "Practice", text: "Fit μ and σ on training data only, then transform train and test with those same values. Otherwise information from the test set leaks into preprocessing." },
    { start: 44, end: 48, chapter: "Recap", text: "Different scales → skinny loss bowls and slow optimization. Rescale for healthier geometry and fairer gradients. Next in the lesson: R² and model quality." },
  ];

  function setHud(time) {
    const c = cues.find((x) => time >= x.start && time < x.end);
    capEl.textContent = c ? c.text : "";
    chapterEl.textContent = c ? c.chapter : "";
  }

  function resize() {
    const r = stage.getBoundingClientRect();
    viewW = Math.max(200, Math.floor(r.width));
    viewH = Math.max(160, Math.floor(r.height));
    dpr = Math.min(window.devicePixelRatio || 1, 2.5);
    canvas.width = Math.floor(viewW * dpr);
    canvas.height = Math.floor(viewH * dpr);
    canvas.style.width = viewW + "px";
    canvas.style.height = viewH + "px";
  }
  new ResizeObserver(resize).observe(stage);
  resize();

  function lerp(a, b, u) { return a + (b - a) * u; }
  function clamp(x, lo, hi) { return Math.max(lo, Math.min(hi, x)); }
  function smoothstep(a, b, x) {
    const tt = clamp((x - a) / (b - a), 0, 1);
    return tt * tt * (3 - 2 * tt);
  }

  function withLogicalDraw(fn) {
    ctx.save();
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    const s = Math.min(viewW / BASE_W, viewH / BASE_H);
    const ox = (viewW - BASE_W * s) / 2;
    const oy = (viewH - BASE_H * s) / 2;
    ctx.translate(ox, oy);
    ctx.scale(s, s);
    fn();
    ctx.restore();
  }

  function drawBackdrop() {
    const g = ctx.createRadialGradient(BASE_W * 0.5, BASE_H * 0.15, 0, BASE_W * 0.5, BASE_H * 0.55, BASE_W * 0.9);
    g.addColorStop(0, "#3d2418");
    g.addColorStop(0.45, "#120c0a");
    g.addColorStop(1, "#060809");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, BASE_W, BASE_H);
  }

  function toCX(mx, my, ox, oy, scale) {
    return [ox + mx * scale, oy - my * scale];
  }

  function lossBad(w1, w2) {
    return 45 * w1 * w1 + w2 * w2;
  }
  function gradBad(w1, w2) {
    return [90 * w1, 2 * w2];
  }
  function lossGood(w1, w2) {
    return w1 * w1 + w2 * w2;
  }
  function gradGood(w1, w2) {
    return [2 * w1, 2 * w2];
  }

  function gdPath(gradFn, w0, lr, maxK) {
    let w1 = w0[0], w2 = w0[1];
    const p = [[w1, w2]];
    for (let k = 0; k < maxK; k++) {
      const [g1, g2] = gradFn(w1, w2);
      w1 -= lr * g1;
      w2 -= lr * g2;
      p.push([w1, w2]);
      if (g1 * g1 + g2 * g2 < 1e-8) break;
    }
    return p;
  }

  const pathBad = gdPath(gradBad, [1.8, 1.6], 0.018, 55);
  const pathGood = gdPath(gradGood, [1.6, 1.5], 0.12, 25);

  function heatColor(u, hueShift) {
    const h = lerp(25 + hueShift, 48 + hueShift, u);
    const s = lerp(70, 88, u);
    const l = lerp(18, 48, u);
    return `hsl(${h},${s}%,${l}%)`;
  }

  function drawLandscape(lossFn, ox, oy, scale, path, pathProgress, label, hueShift) {
    const x0 = -2.3, x1 = 2.3, y0 = -2.3, y1 = 2.3;
    const res = 32;
    let zMin = 1e9, zMax = -1e9;
    const grid = [];
    for (let j = 0; j <= res; j++) {
      grid[j] = [];
      for (let i = 0; i <= res; i++) {
        const wx = lerp(x0, x1, i / res);
        const wy = lerp(y0, y1, j / res);
        const z = lossFn(wx, wy);
        grid[j][i] = z;
        zMin = Math.min(zMin, z);
        zMax = Math.max(zMax, z);
      }
    }
    for (let j = 0; j < res; j++) {
      for (let i = 0; i < res; i++) {
        const z00 = grid[j][i], z10 = grid[j][i + 1], z01 = grid[j + 1][i], z11 = grid[j + 1][i + 1];
        const zm = (z00 + z10 + z01 + z11) / 4;
        const u = (zm - zMin) / (zMax - zMin + 1e-9);
        ctx.fillStyle = heatColor(u, hueShift);
        const wxa = lerp(x0, x1, i / res), wxb = lerp(x0, x1, (i + 1) / res);
        const wya = lerp(y0, y1, j / res), wyb = lerp(y0, y1, (j + 1) / res);
        const [ax, ay] = toCX(wxa, wya, ox, oy, scale);
        const [bx, by] = toCX(wxb, wya, ox, oy, scale);
        const [cx, cy] = toCX(wxb, wyb, ox, oy, scale);
        const [dx, dy] = toCX(wxa, wyb, ox, oy, scale);
        ctx.beginPath();
        ctx.moveTo(ax, ay);
        ctx.lineTo(bx, by);
        ctx.lineTo(cx, cy);
        ctx.lineTo(dx, dy);
        ctx.closePath();
        ctx.fill();
      }
    }
    const n = Math.max(1, Math.min(path.length, Math.ceil(pathProgress * path.length)));
    if (n > 1) {
      ctx.strokeStyle = "#fde68a";
      ctx.lineWidth = 2.8;
      ctx.lineJoin = "round";
      ctx.lineCap = "round";
      ctx.shadowColor = "rgba(251,191,36,0.45)";
      ctx.shadowBlur = 6;
      ctx.beginPath();
      for (let k = 0; k < n; k++) {
        const [wx, wy] = path[k];
        const [px, py] = toCX(wx, wy, ox, oy, scale);
        if (k === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.stroke();
      ctx.shadowBlur = 0;
    }
    if (n >= 1) {
      const [wx, wy] = path[n - 1];
      const [px, py] = toCX(wx, wy, ox, oy, scale);
      ctx.fillStyle = "#fbbf24";
      ctx.beginPath();
      ctx.arc(px, py, 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "#fffbeb";
      ctx.lineWidth = 2;
      ctx.stroke();
    }
    ctx.fillStyle = "#e2e8f0";
    ctx.font = "600 12px ui-monospace, monospace";
    ctx.fillText(label, 14, 22);
    ctx.fillStyle = "#94a3b8";
    ctx.font = "10px system-ui, sans-serif";
    ctx.fillText("lighter = lower loss", 14, 36);
  }

  function drawTitle(sub, pulse) {
    ctx.textAlign = "center";
    ctx.fillStyle = "#fef3c7";
    ctx.font = "bold 28px system-ui, sans-serif";
    ctx.fillText("The danger of different scales", BASE_W / 2, BASE_H / 2 - 28);
    ctx.font = "600 17px system-ui, sans-serif";
    ctx.fillStyle = "#fcd34d";
    ctx.fillText("Feature scaling for regression", BASE_W / 2, BASE_H / 2 + 4);
    ctx.font = "14px system-ui, sans-serif";
    ctx.fillStyle = `rgba(203,213,225,${0.45 + pulse * 0.45})`;
    ctx.fillText(sub, BASE_W / 2, BASE_H / 2 + 38);
    ctx.textAlign = "left";
  }

  function frame(time) {
    t = clamp(time, 0, DURATION);
    progEl.style.width = (t / DURATION * 100) + "%";
    curEl.textContent = fmt(t);
    setHud(t);

    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.fillStyle = "#060809";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    withLogicalDraw(() => {
      drawBackdrop();

      if (t < 5) {
        drawTitle("Why raw magnitudes matter", smoothstep(0, 3.5, t));
        return;
      }

      if (t < 11) {
        ctx.fillStyle = "rgba(30,27,20,0.92)";
        roundRectPath(40, 78, 560, 300, 10);
        ctx.fill();
        ctx.strokeStyle = "rgba(251,191,36,0.35)";
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.fillStyle = "#fbbf24";
        ctx.font = "600 13px system-ui, sans-serif";
        ctx.fillText("Training rows (raw)", 56, 108);
        ctx.fillStyle = "#94a3b8";
        ctx.font = "600 11px ui-monospace, monospace";
        ctx.fillText("sqft", 120, 138);
        ctx.fillText("age (yrs)", 320, 138);
        const rows = [
          ["2,150", "12"],
          ["1,890", "8"],
          ["2,420", "22"],
        ];
        const prog = smoothstep(5, 10, t) * 4;
        for (let r = 0; r < 3; r++) {
          const u = clamp(prog - r, 0, 1);
          ctx.globalAlpha = u;
          ctx.fillStyle = "#e2e8f0";
          ctx.font = "13px ui-monospace, monospace";
          ctx.fillText(rows[r][0], 100, 168 + r * 36);
          ctx.fillStyle = "#7dd3fc";
          ctx.fillText(rows[r][1], 340, 168 + r * 36);
        }
        ctx.globalAlpha = 1;
        ctx.fillStyle = "#fb923c";
        ctx.font = "12px system-ui, sans-serif";
        ctx.fillText("Same model — very different number ranges → awkward loss geometry", 56, 330);
        return;
      }

      if (t < 19) {
        const ox = 320, oy = 268, sc = 72;
        const u = smoothstep(11, 18, t);
        drawLandscape(lossBad, ox, oy, sc, pathBad, u, "MSE landscape (ill-conditioned shape)", 0);
        ctx.fillStyle = "#fca5a5";
        ctx.font = "11px system-ui, sans-serif";
        ctx.fillText("Gradient descent path — steep/narrow valley", 14, BASE_H - 52);
        return;
      }

      if (t < 26) {
        const ox = 320, oy = 268, sc = 72;
        const u = smoothstep(19, 25, t);
        drawLandscape(lossGood, ox, oy, sc, pathGood, u, "After per-feature standardization (sketch)", 15);
        ctx.fillStyle = "#86efac";
        ctx.font = "11px system-ui, sans-serif";
        ctx.fillText("Smoother bowl — fewer zig-zags for the same idea", 14, BASE_H - 52);
        return;
      }

      if (t < 33) {
        ctx.fillStyle = "#fef9c3";
        ctx.font = "600 18px ui-monospace, monospace";
        ctx.fillText("z = (x − μ) / σ", 180, 160);
        ctx.fillStyle = "#94a3b8";
        ctx.font = "13px system-ui, sans-serif";
        ctx.fillText("μ, σ from the training column only", 180, 192);
        const u = smoothstep(26, 32, t);
        ctx.strokeStyle = `rgba(251,191,36,${0.2 + u * 0.55})`;
        ctx.lineWidth = 2;
        roundRectPath(150, 115, 340, 110, 12);
        ctx.stroke();
        ctx.fillStyle = "#cbd5e1";
        ctx.font = "12px system-ui, sans-serif";
        ctx.fillText("Optional: min–max to [0,1] — same goal, different formula", 90, 280);
        return;
      }

      if (t < 38) {
        ctx.fillStyle = "#e2e8f0";
        ctx.font = "600 14px system-ui, sans-serif";
        ctx.fillText("One learning rate, unequal partial derivatives", 70, 120);
        ctx.fillStyle = "#f87171";
        ctx.fillRect(80, 160, 180, 22);
        ctx.fillStyle = "#fff";
        ctx.font = "12px ui-monospace, monospace";
        ctx.fillText("|∂L/∂w_sqft|  large", 90, 176);
        ctx.fillStyle = "#38bdf8";
        ctx.fillRect(360, 210, 180, 22);
        ctx.fillStyle = "#fff";
        ctx.fillText("|∂L/∂w_age|  small", 370, 226);
        ctx.fillStyle = "#94a3b8";
        ctx.font = "12px system-ui, sans-serif";
        ctx.fillText("Scaling balances typical step sizes across weights", 70, 280);
        const wob = Math.sin(t * 12) * 4;
        ctx.strokeStyle = "#fbbf24";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(270, 170 + wob);
        ctx.lineTo(340, 218 - wob * 0.5);
        ctx.stroke();
        return;
      }

      if (t < 44) {
        ctx.fillStyle = "#fef3c7";
        ctx.font = "600 15px system-ui, sans-serif";
        ctx.fillText("Fit scaler on train → transform train & test", 120, 140);
        ctx.strokeStyle = "#64748b";
        ctx.lineWidth = 1.5;
        roundRectPath(100, 175, 200, 100, 8);
        ctx.stroke();
        roundRectPath(340, 175, 200, 100, 8);
        ctx.stroke();
        ctx.fillStyle = "#86efac";
        ctx.font = "12px ui-monospace, monospace";
        ctx.fillText("TRAIN", 170, 200);
        ctx.fillStyle = "#93c5fd";
        ctx.fillText("TEST", 410, 200);
        ctx.fillStyle = "#cbd5e1";
        ctx.font = "11px system-ui, sans-serif";
        ctx.fillText("learn μ, σ", 150, 230);
        ctx.fillText("use same μ, σ", 380, 230);
        ctx.fillStyle = "#f87171";
        ctx.font = "600 11px system-ui, sans-serif";
        ctx.fillText("No peeking at test stats", 120, 310);
        return;
      }

      drawTitle("Standardize · same pipeline · better geometry", 1);
      ctx.textAlign = "center";
      ctx.fillStyle = "#94a3b8";
      ctx.font = "13px system-ui, sans-serif";
      ctx.fillText("Continue with R-squared in the next lesson step.", BASE_W / 2, BASE_H / 2 + 58);
      ctx.textAlign = "left";
    });
  }

  function roundRectPath(x, y, w, h, r) {
    const rr = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + rr, y);
    ctx.arcTo(x + w, y, x + w, y + h, rr);
    ctx.arcTo(x + w, y + h, x, y + h, rr);
    ctx.arcTo(x, y + h, x, y, rr);
    ctx.arcTo(x, y, x + w, y, rr);
    ctx.closePath();
  }

  function tick(ts) {
    if (!lastTs) lastTs = ts;
    const dt = (ts - lastTs) / 1000;
    lastTs = ts;
    if (playing) {
      t += dt;
      if (t >= DURATION) {
        t = DURATION;
        playing = false;
        playBtn.textContent = "Play";
      }
    }
    frame(t);
    requestAnimationFrame(tick);
  }

  playBtn.addEventListener("click", () => {
    playing = !playing;
    playBtn.textContent = playing ? "Pause" : "Play";
    if (playing && t >= DURATION) t = 0;
    lastTs = 0;
  });
  restartBtn.addEventListener("click", () => {
    t = 0;
    playing = true;
    playBtn.textContent = "Pause";
    lastTs = 0;
  });
  document.addEventListener("keydown", (e) => {
    if (e.code === "Space") {
      e.preventDefault();
      playBtn.click();
    }
  });

  frame(0);
  requestAnimationFrame(tick);
  if (/[?&]autoplay=1(?:&|$)/.test(location.search)) {
    playing = true;
    playBtn.textContent = "Pause";
  }
})();
  </script>
</body>
</html>
