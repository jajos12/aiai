<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gradient descent walkthrough</title>
  <style>
    :root {
      --bg: #070a10;
      --panel: rgba(18, 24, 36, 0.92);
      --text: #e8eef7;
      --muted: #8b9cb8;
      --accent: #2dd4bf;
      --accent2: #a78bfa;
      --bar-bg: #1a2233;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, "Segoe UI", sans-serif;
      overflow: hidden;
    }
    .layout {
      display: flex;
      flex-direction: column;
      height: 100%;
      min-height: 100%;
    }
    .title-standalone {
      flex-shrink: 0;
      padding: 10px 14px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
      border-bottom: 1px solid #1e293b;
    }
    .embed .title-standalone { display: none; }
    #stage {
      flex: 1;
      min-height: 0;
      position: relative;
      background: radial-gradient(ellipse 80% 70% at 50% 20%, #152238 0%, #070a10 65%);
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #hud {
      flex-shrink: 0;
      position: relative;
      z-index: 20;
      padding: 8px 12px 10px;
      background: var(--panel);
      border-top: 1px solid rgba(99, 102, 241, 0.15);
      backdrop-filter: blur(10px);
    }
    .bar {
      height: 4px;
      background: var(--bar-bg);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .bar > i {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      border-radius: 2px;
    }
    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    button {
      background: #1e293b;
      color: var(--text);
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 7px 14px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
    }
    button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .time {
      font-variant-numeric: tabular-nums;
      color: var(--muted);
      font-size: 0.8rem;
      margin-left: auto;
    }
    #chapter {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--accent2);
      margin-bottom: 4px;
    }
    #cap {
      font-size: clamp(0.78rem, 1.6vw, 0.92rem);
      line-height: 1.5;
      color: #cbd5e1;
      max-height: clamp(3.2rem, 14vh, 5.5rem);
      overflow-y: auto;
    }
    .hint {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 6px;
    }
    .embed .hint { display: none; }
  </style>
</head>
<body>
  <div class="layout" id="layout">
    <div class="title-standalone">Gradient descent — walkthrough</div>
    <div id="stage"><canvas id="c" aria-label="Gradient descent animation"></canvas></div>
    <div id="hud">
      <div id="chapter"></div>
      <div class="bar"><i id="prog"></i></div>
      <div class="controls">
        <button type="button" id="play">Play</button>
        <button type="button" id="restart">Restart</button>
        <span class="time"><span id="cur">0:00</span> / <span id="tot">—</span></span>
      </div>
      <div id="cap"></div>
      <p class="hint">Tip: Space toggles play. For a video file, record this window with OBS.</p>
    </div>
  </div>

  <script>
(function () {
  /** ~48 s — faster pacing (replay anytime) */
  const DURATION = 48;
  const BASE_W = 640;
  const BASE_H = 480;

  const params = new URLSearchParams(location.search);
  const isEmbed = params.has("embed");
  if (isEmbed) document.getElementById("layout").classList.add("embed");

  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d", { alpha: false });
  const stage = document.getElementById("stage");
  const capEl = document.getElementById("cap");
  const chapterEl = document.getElementById("chapter");
  const progEl = document.getElementById("prog");
  const curEl = document.getElementById("cur");
  const playBtn = document.getElementById("play");
  const restartBtn = document.getElementById("restart");
  const totEl = document.getElementById("tot");

  let viewW = 640;
  let viewH = 480;
  let dpr = 1;

  let t = 0;
  let playing = false;
  let lastTs = 0;

  function fmt(sec) {
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return m + ":" + String(s).padStart(2, "0");
  }
  totEl.textContent = fmt(DURATION);

  const cues = [
    { start: 0, end: 4, chapter: "Overview", text: "Gradient descent is how models find parameters that shrink a loss function — a score of “how wrong we are.” The idea is to roll downhill on that loss until updates barely help." },
    { start: 4, end: 9, chapter: "One dimension", text: "With one weight w, loss L(w) often forms a bowl-shaped curve. The bottom is a minimum. We start at some w and move step by step toward lower loss." },
    { start: 9, end: 14, chapter: "Slope & gradient", text: "The derivative dL/dw is the slope at w. It points uphill along the w axis. The gradient in 1D is that single number; we will step opposite to it." },
    { start: 14, end: 19, chapter: "Update rule", text: "The step is w ← w − η·(dL/dw). η (eta) is the learning rate — step length. We subtract the gradient direction because we want to decrease loss, not climb it." },
    { start: 19, end: 24, chapter: "Steps on a parabola", text: "Each step uses the slope where you stand. On L(w)=w², near the minimum the slope is small, so steps shrink — typical of smooth convex bowls." },
    { start: 24, end: 30, chapter: "Two weights", text: "With w₁ and w₂, loss is a surface L(w₁,w₂). The gradient ∇L is the vector of partial derivatives. It points uphill; descent moves the opposite way." },
    { start: 30, end: 36, chapter: "Valley geometry", text: "The heatmap is an elongated bowl (mixed quadratic terms). Gradient descent follows steepest descent locally, so the path bends along the valley toward the low point." },
    { start: 36, end: 41, chapter: "Learning rate", text: "η too small: crawling progress. η too large: overshoot, zig-zag, or divergence. Good η gives steady decrease — practice and schedules (or Adam) help in real training." },
    { start: 41, end: 46, chapter: "Stochastic GD", text: "SGD uses noisy gradients from mini-batches. The path wiggles, but updates are cheaper and noise can help in rough landscapes." },
    { start: 46, end: 48, chapter: "Recap", text: "Core recipe: follow −∇L with a sensible step size. The same pattern scales from this toy picture to deep networks. Replay anytime." },
  ];

  function setHud(time) {
    const c = cues.find((x) => time >= x.start && time < x.end);
    capEl.textContent = c ? c.text : "";
    chapterEl.textContent = c ? c.chapter : "";
  }

  function resize() {
    const r = stage.getBoundingClientRect();
    viewW = Math.max(200, Math.floor(r.width));
    viewH = Math.max(160, Math.floor(r.height));
    dpr = Math.min(window.devicePixelRatio || 1, 2.5);
    canvas.width = Math.floor(viewW * dpr);
    canvas.height = Math.floor(viewH * dpr);
    canvas.style.width = viewW + "px";
    canvas.style.height = viewH + "px";
  }

  new ResizeObserver(resize).observe(stage);
  resize();

  function lerp(a, b, u) { return a + (b - a) * u; }
  function clamp(x, lo, hi) { return Math.max(lo, Math.min(hi, x)); }
  function smoothstep(edge0, edge1, x) {
    const t = clamp((x - edge0) / (edge1 - edge0), 0, 1);
    return t * t * (3 - 2 * t);
  }

  function withLogicalDraw(fn) {
    ctx.save();
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    const s = Math.min(viewW / BASE_W, viewH / BASE_H);
    const ox = (viewW - BASE_W * s) / 2;
    const oy = (viewH - BASE_H * s) / 2;
    ctx.translate(ox, oy);
    ctx.scale(s, s);
    fn();
    ctx.restore();
  }

  function toCX(mx, my, ox, oy, scale) {
    return [ox + mx * scale, oy - my * scale];
  }

  function drawBackdrop() {
    const g = ctx.createRadialGradient(BASE_W * 0.5, BASE_H * 0.15, 0, BASE_W * 0.5, BASE_H * 0.5, BASE_W * 0.75);
    g.addColorStop(0, "#152642");
    g.addColorStop(0.45, "#0c1220");
    g.addColorStop(1, "#060912");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, BASE_W, BASE_H);
    ctx.strokeStyle = "rgba(148,163,184,0.06)";
    ctx.lineWidth = 1;
    for (let i = 0; i < BASE_W; i += 40) {
      ctx.beginPath();
      ctx.moveTo(i, 0);
      ctx.lineTo(i, BASE_H);
      ctx.stroke();
    }
    for (let j = 0; j < BASE_H; j += 40) {
      ctx.beginPath();
      ctx.moveTo(0, j);
      ctx.lineTo(BASE_W, j);
      ctx.stroke();
    }
  }

  function drawGrid(ox, oy, scale, x0, x1, y0, y1) {
    ctx.strokeStyle = "rgba(30,41,59,0.9)";
    ctx.lineWidth = 1;
    for (let gx = Math.ceil(x0); gx <= Math.floor(x1); gx++) {
      const [xa, ya] = toCX(gx, y0, ox, oy, scale);
      const [xb, yb] = toCX(gx, y1, ox, oy, scale);
      ctx.beginPath();
      ctx.moveTo(xa, ya);
      ctx.lineTo(xb, yb);
      ctx.stroke();
    }
    for (let gy = Math.ceil(y0); gy <= Math.floor(y1); gy++) {
      const [xa, ya] = toCX(x0, gy, ox, oy, scale);
      const [xb, yb] = toCX(x1, gy, ox, oy, scale);
      ctx.beginPath();
      ctx.moveTo(xa, ya);
      ctx.lineTo(xb, yb);
      ctx.stroke();
    }
    ctx.strokeStyle = "rgba(71,85,105,0.95)";
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    const [zx0, zy0] = toCX(0, y0, ox, oy, scale);
    const [zx1, zy1] = toCX(0, y1, ox, oy, scale);
    ctx.moveTo(zx0, zy0);
    ctx.lineTo(zx1, zy1);
    const [yx0, yy0] = toCX(x0, 0, ox, oy, scale);
    const [yx1, yy1] = toCX(x1, 0, ox, oy, scale);
    ctx.moveTo(yx0, yy0);
    ctx.lineTo(yx1, yy1);
    ctx.stroke();
  }

  function drawBall(cx, cy, r, fill, glow) {
    ctx.save();
    ctx.shadowColor = glow;
    ctx.shadowBlur = 18;
    ctx.fillStyle = fill;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = "rgba(255,255,255,0.85)";
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();
  }

  function draw1DParabola(ox, oy, scale, wMin, wMax, highlightW, showTangent, lr) {
    drawGrid(ox, oy, scale, wMin, wMax, -0.2, 8.5);

    const pts = [];
    for (let i = 0; i <= 240; i++) {
      const w = lerp(wMin, wMax, i / 240);
      pts.push(toCX(w, w * w, ox, oy, scale));
    }
    const gradFill = ctx.createLinearGradient(ox - 200, oy, ox + 200, oy - scale * 6);
    gradFill.addColorStop(0, "rgba(45,212,191,0.12)");
    gradFill.addColorStop(1, "rgba(99,102,241,0.08)");
    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
    const [lx0, lyBottom] = toCX(wMax, -0.2, ox, oy, scale);
    const [lx1, lyBottom2] = toCX(wMin, -0.2, ox, oy, scale);
    ctx.lineTo(lx0, lyBottom);
    ctx.lineTo(lx1, lyBottom2);
    ctx.closePath();
    ctx.fillStyle = gradFill;
    ctx.fill();

    ctx.strokeStyle = "#64748b";
    ctx.lineWidth = 3;
    ctx.lineJoin = "round";
    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
    ctx.stroke();

    ctx.fillStyle = "#94a3b8";
    ctx.font = "600 15px ui-monospace, monospace";
    ctx.fillText("L(w) = w²", ox + wMin * scale + 10, oy - 10);

    const Lh = highlightW * highlightW;
    const [hx, hy] = toCX(highlightW, Lh, ox, oy, scale);
    if (showTangent) {
      const grad = 2 * highlightW;
      const len = 2.4;
      const [tx, ty] = toCX(highlightW + len, Lh + grad * len, ox, oy, scale);
      ctx.strokeStyle = "#f87171";
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(hx, hy);
      ctx.lineTo(tx, ty);
      ctx.stroke();
      ctx.fillStyle = "#fca5a5";
      ctx.font = "12px ui-monospace, monospace";
      ctx.fillText("dL/dw = 2w", Math.min(hx + 12, BASE_W - 120), Math.max(hy - 14, 22));
      const nw = highlightW - lr * grad;
      const [nx, ny] = toCX(nw, nw * nw, ox, oy, scale);
      ctx.strokeStyle = "#2dd4bf";
      ctx.setLineDash([5, 5]);
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(hx, hy);
      ctx.lineTo(nx, ny);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = "#5eead4";
      ctx.fillText("−η · gradient", nx + 8, ny - 8);
    }
    drawBall(hx, hy, 9, "#fb923c", "rgba(251,146,60,0.65)");
  }

  function loss2D(wx, wy) {
    return 0.55 * wx * wx + 1.35 * wy * wy + 0.25 * wx * wy;
  }
  function grad2D(wx, wy) {
    return [1.1 * wx + 0.25 * wy, 2.7 * wy + 0.25 * wx];
  }

  function heatColor(u) {
    const h = lerp(210, 165, u);
    const s = lerp(45, 85, u);
    const l = lerp(22, 52, u);
    return `hsl(${h},${s}%,${l}%)`;
  }

  function draw2DScene(ox, oy, scale, path, noiseAmp, showGrad) {
    const x0 = -3.2, x1 = 3.2, y0 = -3.2, y1 = 3.2;
    const res = 36;
    let zMin = 1e9, zMax = -1e9;
    const grid = [];
    for (let j = 0; j <= res; j++) {
      grid[j] = [];
      for (let i = 0; i <= res; i++) {
        const wx = lerp(x0, x1, i / res);
        const wy = lerp(y0, y1, j / res);
        const z = loss2D(wx, wy);
        grid[j][i] = z;
        zMin = Math.min(zMin, z);
        zMax = Math.max(zMax, z);
      }
    }
    for (let j = 0; j < res; j++) {
      for (let i = 0; i < res; i++) {
        const z00 = grid[j][i], z10 = grid[j][i + 1], z01 = grid[j + 1][i], z11 = grid[j + 1][i + 1];
        const zm = (z00 + z10 + z01 + z11) / 4;
        const u = (zm - zMin) / (zMax - zMin + 1e-9);
        ctx.fillStyle = heatColor(u);
        const wxa = lerp(x0, x1, i / res), wxb = lerp(x0, x1, (i + 1) / res);
        const wya = lerp(y0, y1, j / res), wyb = lerp(y0, y1, (j + 1) / res);
        const [ax, ay] = toCX(wxa, wya, ox, oy, scale);
        const [bx, by] = toCX(wxb, wya, ox, oy, scale);
        const [cx, cy] = toCX(wxb, wyb, ox, oy, scale);
        const [dx, dy] = toCX(wxa, wyb, ox, oy, scale);
        ctx.beginPath();
        ctx.moveTo(ax, ay);
        ctx.lineTo(bx, by);
        ctx.lineTo(cx, cy);
        ctx.lineTo(dx, dy);
        ctx.closePath();
        ctx.fill();
      }
    }

    ctx.strokeStyle = "rgba(226,232,240,0.12)";
    ctx.lineWidth = 1;
    const nIso = 8;
    for (let k = 1; k < nIso; k++) {
      const target = zMin + (k / nIso) * (zMax - zMin);
      ctx.beginPath();
      for (let j = 0; j < res; j++) {
        for (let i = 0; i < res; i++) {
          const a = grid[j][i] - target;
          const b = grid[j][i + 1] - target;
          const c = grid[j + 1][i + 1] - target;
          const d = grid[j + 1][i] - target;
          const wxa = lerp(x0, x1, i / res), wxb = lerp(x0, x1, (i + 1) / res);
          const wya = lerp(y0, y1, j / res), wyb = lerp(y0, y1, (j + 1) / res);
          function edge(p1, p2, x1, y1, x2, y2) {
            if ((p1 > 0) === (p2 > 0)) return null;
            const tt = Math.abs(p1) / (Math.abs(p1) + Math.abs(p2) + 1e-12);
            return [lerp(x1, x2, tt), lerp(y1, y2, tt)];
          }
          const e0 = edge(a, b, wxa, wya, wxb, wya);
          const e1 = edge(b, c, wxb, wya, wxb, wyb);
          const e2 = edge(c, d, wxb, wyb, wxa, wyb);
          const e3 = edge(d, a, wxa, wyb, wxa, wya);
          const es = [e0, e1, e2, e3].filter(Boolean);
          if (es.length === 2) {
            const [p1, p2] = es;
            const [sx1, sy1] = toCX(p1[0], p1[1], ox, oy, scale);
            const [sx2, sy2] = toCX(p2[0], p2[1], ox, oy, scale);
            ctx.moveTo(sx1, sy1);
            ctx.lineTo(sx2, sy2);
          }
        }
      }
      ctx.stroke();
    }

    if (path.length > 1) {
      ctx.strokeStyle = "#fbbf24";
      ctx.lineWidth = 3;
      ctx.lineJoin = "round";
      ctx.lineCap = "round";
      ctx.shadowColor = "rgba(251,191,36,0.4)";
      ctx.shadowBlur = 8;
      ctx.beginPath();
      for (let k = 0; k < path.length; k++) {
        const [wx, wy] = path[k];
        const [px, py] = toCX(wx, wy, ox, oy, scale);
        if (k === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.stroke();
      ctx.shadowBlur = 0;
    }
    if (path.length) {
      const last = path[path.length - 1];
      let wx = last[0], wy = last[1];
      if (noiseAmp > 0) {
        wx += (Math.sin(t * 4.7) * 0.5 + Math.cos(t * 3.1) * 0.35) * noiseAmp;
        wy += (Math.cos(t * 4.1) * 0.5 + Math.sin(t * 2.7) * 0.35) * noiseAmp;
      }
      const [gx, gy] = grad2D(last[0], last[1]);
      if (showGrad) {
        const gscale = 0.38;
        const [vx, vy] = toCX(last[0] + gx * gscale, last[1] + gy * gscale, ox, oy, scale);
        const [px, py] = toCX(last[0], last[1], ox, oy, scale);
        ctx.strokeStyle = "#f87171";
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.moveTo(px, py);
        ctx.lineTo(vx, vy);
        ctx.stroke();
      }
      const [px, py] = toCX(wx, wy, ox, oy, scale);
      drawBall(px, py, 10, "#fb923c", "rgba(251,146,60,0.7)");
    }
    ctx.fillStyle = "#e2e8f0";
    ctx.font = "600 12px ui-monospace, monospace";
    ctx.fillText("Loss surface L(w₁, w₂) — elongated bowl", 14, 24);
  }

  function gdPath(wx, wy, lr, steps, capLoss) {
    const p = [[wx, wy]];
    for (let s = 0; s < steps; s++) {
      const [g1, g2] = grad2D(wx, wy);
      wx -= lr * g1;
      wy -= lr * g2;
      p.push([wx, wy]);
      if (loss2D(wx, wy) < capLoss) break;
    }
    return p;
  }

  function drawTitle(sub, pulse) {
    ctx.textAlign = "center";
    ctx.fillStyle = "#f8fafc";
    ctx.font = "bold 36px system-ui, sans-serif";
    ctx.fillText("Gradient Descent", BASE_W / 2, BASE_H / 2 - 32);
    ctx.font = "500 17px system-ui, sans-serif";
    ctx.fillStyle = "#94a3b8";
    ctx.fillText(sub, BASE_W / 2, BASE_H / 2 + 8);
    if (pulse > 0) {
      ctx.strokeStyle = `rgba(45,212,191,${0.15 + pulse * 0.25})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(BASE_W / 2, BASE_H / 2 - 8, 120 + pulse * 40, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.textAlign = "left";
  }

  function miniParabolaPlot(cx, cy, plotW, plotH, eta, w0, color, label, animT) {
    const ox = cx + plotW / 2;
    const oy = cy + plotH - 28;
    const scale = (plotH - 36) / 6.5;
    const wMin = -2.8, wMax = 2.8;
    drawGrid(ox, oy, scale, wMin, wMax, -0.15, 6.2);
    ctx.strokeStyle = "#475569";
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let i = 0; i <= 100; i++) {
      const w = lerp(wMin, wMax, i / 100);
      const L = w * w * 0.35 + 0.15;
      const [px, py] = toCX(w, L, ox, oy, scale);
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.stroke();
    function stepsFor() {
      let w = w0;
      const pts = [[w, w * w * 0.35 + 0.15]];
      for (let k = 0; k < 35; k++) {
        const g = 0.7 * w;
        w -= eta * g;
        pts.push([w, w * w * 0.35 + 0.15]);
        if (Math.abs(w) < 0.03) break;
      }
      return pts;
    }
    const pts = stepsFor();
    const nShow = Math.max(1, Math.min(pts.length, 1 + Math.floor(animT * (pts.length - 1))));
    ctx.strokeStyle = color;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    for (let i = 0; i < nShow; i++) {
      const [w, L] = pts[i];
      const [px, py] = toCX(w, L, ox, oy, scale);
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.stroke();
    const [lw, lL] = pts[nShow - 1];
    const [lx, ly] = toCX(lw, lL, ox, oy, scale);
    drawBall(lx, ly, 6, color, color);
    ctx.fillStyle = "#e2e8f0";
    ctx.font = "600 11px system-ui, sans-serif";
    ctx.textAlign = "center";
    ctx.fillText(label, cx + plotW / 2, cy + 14);
    ctx.textAlign = "left";
  }

  function drawTripleLRCompare(localT) {
    const anim = smoothstep(0, 0.65, localT % 1) * 0.98 + 0.02;
    const colW = 200;
    const gap = 20;
    const startX = (BASE_W - (3 * colW + 2 * gap)) / 2;
    const topY = 70;
    const plotH = 320;
    ctx.fillStyle = "#cbd5e1";
    ctx.font = "600 15px system-ui, sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("Same parabola — three learning rates side by side", BASE_W / 2, 42);
    ctx.textAlign = "left";
    miniParabolaPlot(startX, topY, colW, plotH, 0.08, 2.2, "#2dd4bf", "η small — slow", anim);
    miniParabolaPlot(startX + colW + gap, topY, colW, plotH, 0.95, 2.2, "#a78bfa", "η balanced", anim);
    miniParabolaPlot(startX + 2 * (colW + gap), topY, colW, plotH, 2.2, 1.15, "#f87171", "η large — unstable", anim);
  }

  function simulate2DPath(lr, steps) {
    return gdPath(2.4, 2.0, lr, steps, 1e-4);
  }

  const pathOk = simulate2DPath(0.22, 80);

  function frame(time) {
    t = clamp(time, 0, DURATION);
    progEl.style.width = (t / DURATION * 100) + "%";
    curEl.textContent = fmt(t);
    setHud(t);

    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.fillStyle = "#060912";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    withLogicalDraw(() => {
      drawBackdrop();

      if (t < 4) {
        drawTitle(
          t < 2 ? "Rolling downhill on loss" : "From intuition to the update rule",
          clamp(Math.sin(t * 4.5) * 0.5 + 0.5, 0, 1),
        );
        return;
      }

      if (t < 24) {
        const ox = 340, oy = 400, scale = 70;
        const wMin = -3.2, wMax = 3.2;
        let w = 2.35;
        const lr = 0.12;
        const stepDt = 0.56;
        if (t >= 19 && t < 24) {
          const seg = t - 19;
          const cycles = Math.floor(seg / stepDt);
          w = 2.35;
          for (let i = 0; i <= cycles; i++) {
            const g = 2 * w;
            w -= lr * g;
          }
          const frac = (seg % stepDt) / stepDt;
          w -= lr * (2 * w) * frac;
        }
        draw1DParabola(ox, oy, scale, wMin, wMax, w, t >= 9, lr);
        if (t < 9) {
          ctx.fillStyle = "#e2e8f0";
          ctx.font = "600 16px system-ui, sans-serif";
          ctx.fillText("Convex loss in a single weight", 36, 52);
        }
        return;
      }

      if (t < 36) {
        const ox = 320, oy = 270, scale = 68;
        const seg = t - 24;
        const revealSec = 5;
        let path;
        if (seg < revealSec) {
          const u = seg / revealSec;
          const k = Math.floor(u * (pathOk.length - 1));
          path = pathOk.slice(0, k + 1);
        } else {
          path = pathOk;
        }
        draw2DScene(ox, oy, scale, path, 0, t >= 30 && t < 35);
        return;
      }

      if (t < 41) {
        drawTripleLRCompare(t - 36);
        return;
      }

      if (t < 46) {
        const ox = 320, oy = 270, scale = 68;
        const path = pathOk.slice(0, Math.max(1, Math.min(pathOk.length, 10 + Math.floor((t - 41) * 5.5))));
        draw2DScene(ox, oy, scale, path, 0.24, false);
        ctx.fillStyle = "#fde68a";
        ctx.font = "600 14px system-ui, sans-serif";
        ctx.fillText("Noisy mini-batch gradient (exaggerated)", 36, 48);
        return;
      }

      drawTitle("w ← w − η ∇L", 0);
      ctx.textAlign = "center";
      ctx.fillStyle = "#64748b";
      ctx.font = "14px ui-monospace, monospace";
      ctx.fillText("Same idea from linear models to deep nets.", BASE_W / 2, BASE_H / 2 + 48);
      ctx.textAlign = "left";
    });
  }

  function tick(ts) {
    if (!lastTs) lastTs = ts;
    const dt = (ts - lastTs) / 1000;
    lastTs = ts;
    if (playing) {
      t += dt;
      if (t >= DURATION) {
        t = DURATION;
        playing = false;
        playBtn.textContent = "Play";
      }
    }
    frame(t);
    requestAnimationFrame(tick);
  }

  playBtn.addEventListener("click", () => {
    playing = !playing;
    playBtn.textContent = playing ? "Pause" : "Play";
    if (playing && t >= DURATION) t = 0;
    lastTs = 0;
  });
  restartBtn.addEventListener("click", () => {
    t = 0;
    playing = true;
    playBtn.textContent = "Pause";
    lastTs = 0;
  });

  document.addEventListener("keydown", (e) => {
    if (e.code === "Space") {
      e.preventDefault();
      playBtn.click();
    }
  });

  frame(0);
  requestAnimationFrame(tick);

  if (/[?&]autoplay=1(?:&|$)/.test(location.search)) {
    playing = true;
    playBtn.textContent = "Pause";
  }
})();
  </script>
</body>
</html>
